<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Offline — Abzar</title>
  <style>
    :root {
      --bg: #fafaf9;
      --fg: #1c1917;
      --muted: #78716c;
      --accent: #f59e0b;
      --surface: #ffffff;
      --border: #e7e5e4;
    }
    .dark {
      --bg: #0c0a09;
      --fg: #fafaf9;
      --muted: #a8a29e;
      --accent: #f59e0b;
      --surface: #1c1917;
      --border: #292524;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      margin-bottom: 1.5rem;
    }
    .icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--accent);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      color: var(--muted);
      font-size: 0.9375rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .actions {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--fg);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover {
      background: color-mix(in srgb, var(--accent) 10%, var(--surface));
    }
    .brand {
      margin-top: 2rem;
      font-size: 0.8125rem;
      color: var(--muted);
    }
    .brand strong {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
  <script>
    try {
      var t = localStorage.getItem("abzar:theme");
      var d = document.documentElement;
      if (t === "dark") d.classList.add("dark");
      else if (t !== "light" && window.matchMedia("(prefers-color-scheme:dark)").matches) d.classList.add("dark");
    } catch (e) {}
  </script>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>This page hasn't been cached yet. Visit it once while online and it will be available offline next time.</p>
    <div class="actions">
      <button class="btn" onclick="window.location.reload()">Try Again</button>
      <a href="/" class="btn">Homepage</a>
    </div>
    <div class="brand"><strong>Abzar</strong> — 200+ Free Browser Tools</div>
  </div>
</body>
</html>
